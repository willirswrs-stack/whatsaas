version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatsaas-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-wathsaas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsaas-network

  redis:
    image: redis:alpine
    container_name: whatsaas-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-wathsaas_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - whatsaas-network

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: always
    environment:
      - SERVER_URL=https://evolution.seusaas.com.br
      - CONFIG_SESSION_PHONE_CLIENT=WhatSaas
      - AUTH_TYPE=apikey
      - AUTH_API_KEY=${EVOLUTION_API_KEY:-evolution_key_2024}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-wathsaas}?schema=public
      - REDIS_ENABLED=true
      - REDIS_URI=redis://:${REDIS_PASSWORD:-wathsaas_redis_2024}@redis:6379/1
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD:-wathsaas_redis_2024}@redis:6379/2
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - whatsaas-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsaas-backend
    restart: always
    env_file: .env
    ports:
      - "3333:3333"
    depends_on:
      - postgres
      - redis
    networks:
      - whatsaas-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://2.25.159.205:3333/api/v1
    container_name: whatsaas-frontend
    restart: always
    env_file: ./frontend/.env.production
    ports:
      - "3000:3000"
    networks:
      - whatsaas-network

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

networks:
  whatsaas-network:
    driver: bridge
